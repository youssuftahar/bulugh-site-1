<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>منصة بلوغ المرام</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
/* كل الـ CSS السابق الخاص بك يبقى كما هو (لم أغيره) */
*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none}
*::-webkit-scrollbar{display:none}
:root{--blue:#2563EB;--bl:#EFF6FF;--bm:#BFDBFE;--bd:#1d4ed8;--green:#16a34a;--gl:#f0fdf4;--red:#dc2626;--rl:#fef2f2;--yellow:#f59e0b;--yl:#fffbeb;--purple:#7c3aed;--pl:#f5f3ff;--gray:#6b7280;--grl:#f9fafb;--border:#e5e7eb;--text:#111827;--bg:#f1f5f9;--card:#fff;--nav-bg:rgba(255,255,255,.97)}
/* ... باقي الـ CSS الخاص بك (كما في الملف الأصلي) ... */
body{font-family:'Tajawal',sans-serif;color:var(--text);direction:rtl;min-height:100vh;background:var(--bg)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.18s}
.bp{background:var(--blue);color:#fff}.bp:hover{background:var(--bd)}
</style>
</head>
<body>
<div class="twrap" id="toasts"></div>
<!-- باقي HTML الصفحة كما هو عندك (من <div class="lbox"> إلى نهاية <div id="app">) -->

<script>
// === متغيرات جديدة ===
let isInExercise = false;
let chatHistory = [];
let interactiveScore = 0;

// === زر الشات بوت العائم + النافذة ===
const chatHTML = `
<div id="chat-float" onclick="toggleChat()" style="position:fixed;bottom:20px;right:20px;width:58px;height:58px;background:linear-gradient(135deg,#10b981,#059669);border-radius:50%;box-shadow:0 6px 20px rgba(16,185,129,.5);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;z-index:9999;color:white;">
  💬
</div>

<div id="chat-window" style="display:none;position:fixed;bottom:90px;right:20px;width:340px;height:480px;background:white;border-radius:18px;box-shadow:0 10px 40px rgba(0,0,0,.25);overflow:hidden;z-index:10000;flex-direction:column;">
  <div style="background:linear-gradient(135deg,#10b981,#059669);color:white;padding:14px 16px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;">
    <span>💬 دردشة مع المعلم الذكي</span>
    <span onclick="toggleChat()" style="cursor:pointer;font-size:24px;">✕</span>
  </div>
  <div id="chat-messages" style="flex:1;padding:16px;overflow-y:auto;background:#f8fafc;font-size:14px;line-height:1.6;"></div>
  <div style="padding:12px;border-top:1px solid #e5e7eb;display:flex;gap:8px;">
    <input id="chat-input" type="text" placeholder="اكتب سؤالك هنا..." style="flex:1;padding:12px;border:1px solid #d1d5db;border-radius:12px;outline:none;font-size:14px;">
    <button onclick="sendChatMessage()" style="padding:0 20px;background:#10b981;color:white;border:none;border-radius:12px;font-weight:700;">إرسال</button>
  </div>
</div>`;
document.body.insertAdjacentHTML('beforeend', chatHTML);

// === دوال الشات بوت ===
function toggleChat() {
  if (isInExercise) { toast("الشات بوت متوقف أثناء حل التمارين", "er"); return; }
  const win = document.getElementById('chat-window');
  win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;

  const messagesDiv = document.getElementById('chat-messages');
  messagesDiv.innerHTML += `<div style="text-align:right;background:#dbeafe;padding:10px 14px;border-radius:12px;margin:8px 0;max-width:85%;">${message}</div>`;
  input.value = '';
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history: chatHistory })
    });
    const data = await res.json();
    chatHistory.push({ role: 'user', content: message });
    chatHistory.push({ role: 'assistant', content: data.reply });

    messagesDiv.innerHTML += `<div style="text-align:left;background:#f0fdf4;padding:10px 14px;border-radius:12px;margin:8px 0;max-width:85%;">${data.reply}</div>`;
  } catch (e) {
    messagesDiv.innerHTML += `<div style="color:#ef4444;">حدث خطأ في الاتصال</div>`;
  }
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// === ذكاء التلميحات ===
async function getHint(question, studentAnswer = "", subject = "رياضيات") {
  try {
    const res = await fetch('/api/hint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, studentAnswer, subject })
    });
    const data = await res.json();
    return data.hint || "فكّر جيداً في الخطوة الأولى...";
  } catch (e) {
    return "حاول مرة أخرى، سأعطيك تلميحاً أفضل";
  }
}

// === الذكاء التحليلي ===
async function showAnalysis() {
  const history = JSON.parse(localStorage.getItem('studentAnswers') || '[]');
  if (history.length === 0) {
    toast("أكمل بعض التمارين أولاً لأعطيك تحليلاً", "er");
    return;
  }
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ history: JSON.stringify(history) })
    });
    const data = await res.json();
    alert("📊 تقرير أدائك:\n\n" + data.report);
  } catch (e) {
    toast("حدث خطأ في التحليل، حاول لاحقاً", "er");
  }
}

// === تعديل دالة التمارين لتستخدم التلميح الذكي ===
async function askPracticeQuestion() {
  isInExercise = true;
  const feedback = document.getElementById('interactive-feedback');
  if (!curLesson?.questions?.length) {
    feedback.innerHTML = 'لا توجد أسئلة حالياً';
    isInExercise = false;
    return;
  }

  const q = curLesson.questions[0];
  let userAnswer = prompt(`✍️ ${q.q}\n\nأدخل إجابتك`);

  if (!userAnswer) { isInExercise = false; return; }

  const correct = (q.type === 'mcq') ? (parseInt(userAnswer)-1 === q.ans) : 
                  (q.type === 'tf') ? (userAnswer.trim().toLowerCase() === String(q.ans).toLowerCase()) :
                  (userAnswer.trim().toLowerCase() === String(q.ans).toLowerCase());

  if (correct) {
    interactiveScore++;
    feedback.innerHTML = `✅ صحيح! النقاط: ${interactiveScore}`;
  } else {
    feedback.innerHTML = `❌ خطأ<br>هل تريد تلميح ذكي؟`;
    if (confirm("هل تريد تلميح؟")) {
      const hint = await getHint(q.q, userAnswer, curLesson.subject || "رياضيات");
      feedback.innerHTML += `<br><strong>💡 تلميح:</strong> ${hint}`;
    }
  }

  // حفظ للتحليل
  let answers = JSON.parse(localStorage.getItem('studentAnswers') || '[]');
  answers.push({ subject: curLesson.subject || "رياضيات", question: q.q, answer: userAnswer, correct, timestamp: new Date().toISOString() });
  localStorage.setItem('studentAnswers', JSON.stringify(answers));

  isInExercise = false;
}

// === دالة openLesson (مع تصفير) ===
function openLesson(chId, lId) {
  const ch = chapters.find(c => c.id === chId);
  curLesson = ch?.lessons?.find(l => l.id === lId);
  if (!curLesson) return;
  interactiveScore = 0;
  isInExercise = false;
  renderLesson();
}

// === إضافة زر التحليل في renderHome ===
function renderHome() {
  // ... باقي الكود السابق لـ renderHome ...
  // أضف هذا الزر في مكان مناسب (مثلاً بعد بطاقة الترحيب)
  const analysisHTML = `<button onclick="showAnalysis()" class="btn bp blk" style="margin:12px 0;width:100%">📊 تحليل أدائي بالذكاء الاصطناعي</button>`;
  // أدرجه في innerHTML الصفحة الرئيسية
}

// === في نهاية <script> ===
document.addEventListener('DOMContentLoaded', () => {
  // ... باقي الكود ...
  if (user && !isAdmin) {
    setTimeout(() => {
      const float = document.getElementById('chat-float');
      if (float) float.style.display = 'flex';
    }, 1000);
  }
});
</script>
</body>
</html>
